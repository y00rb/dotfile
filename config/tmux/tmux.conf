# Tmux Configuration
# Setup:
#   1. Copy: cp ./config/tmux/tmux.conf ~/.config/tmux/tmux.conf
#   2. Install TPM: git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm
#   3. Start tmux, press prefix + I to install plugins

# ---------------------
# Prefix Key
# ---------------------
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# ---------------------
# General Settings
# ---------------------
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -sg escape-time 0
set -g focus-events on
set -g status-interval 5
set -g message-style "fg=#cdd6f4,bg=#1e1e2e"
set -g display-panes-time 2000
set -g status-position top

# ---------------------
# Keybindings
# ---------------------

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display-popup -d "#{pane_current_path}" -x R -y 1 -w 22 -h 3 -S fg=#a6e3a1 -s fg=#cdd6f4,bg=#1e1e2e -E "echo ' Config reloaded!' && sleep 1"

# Split panes (h = horizontal, v = vertical, open in current path)
bind h split-window -h -c "#{pane_current_path}"
bind v split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Close pane without confirmation
bind x kill-pane

# New window in current path
bind c new-window -c "#{pane_current_path}"

# Pane navigation (M = Option on macOS)
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# Pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Window switching (Option + [ / ])
bind -n M-[ previous-window
bind -n M-] next-window

# Session picker (zt)
bind z display-popup -E -w 60% -h 60% "zsh -ic '_zt_connect'"

# Copy mode (vi keys)
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# ---------------------
# Catppuccin Theme (v2.x)
# ---------------------
set -g @catppuccin_flavor "mocha"

# Window styling
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_number_position "left"
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W#{?window_zoomed_flag,(),}"
set -g @catppuccin_window_flags "icon"
set -g @catppuccin_window_flags_icon_position 0

# Pane border
set -g pane-active-border-style 'fg=magenta,bg=default'
set -g pane-border-style 'fg=brightblack,bg=default'

# ---------------------
# Plugins
# ---------------------
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.config/tmux/plugins'
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'catppuccin/tmux#v2.1.3'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'wfxr/tmux-fzf-url'

# tmux-fzf-url
set -g @fzf-url-fzf-options '-p 60%,30% --prompt="   " --border-label=" Open URL "'
set -g @fzf-url-history-limit '2000'

# tmux-continuum
# Manual restore: prefix + Ctrl-r
# set -g @continuum-restore 'on'
set -g @resurrect-strategy-nvim 'session'

# Directory module config
set -g @catppuccin_directory_text " #{b:pane_current_path}"

# Initialize TPM
run '~/.config/tmux/plugins/tpm/tpm'

# ---------------------
# Status Bar Layout (MUST be after catppuccin is loaded)
# ---------------------
# Status bar background matches terminal
set -g status-style "bg=#1e1e2e"

# Center the window list
set -g status-justify absolute-centre

# Left: session name
set -g status-left "#{E:@catppuccin_status_session}"
set -g status-left-length 50

# Right: directory normally, key hints when prefix is pressed
set -g status-right "#{?client_prefix,#[fg=#f9e2af] h split  v split  c new  r reload  ? keys ,#{E:@catppuccin_status_directory}}"
set -g status-right-length 120
